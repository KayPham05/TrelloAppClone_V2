name: ASP-Dotnet-CI

on:
    push:
        branches: [ "main" ]
        paths:
            - "C#/TodoAppAPI/**"
    pull_request:
        branches: [ "main" ]
        paths:
            - "C#/TodoAppAPI/**"
jobs:
    build:
        runs-on: windows-latest
        steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: setup dotnet
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '10.0.201'
        - name: restore dependencies
          run: dotnet restore
        - name: build
          run: dotnet build --no-restore
        - name: test
          run: dotnet test --no-build