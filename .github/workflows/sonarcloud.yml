name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # ===== SETUP SONARSCANNER FOR .NET =====
      - name: Setup Java 17 (Required by SonarScanner)
        uses: actions/setup-java@c1a539c6d33f2de0d6f47e8fe1f7800069d7d9dc # v4.7.1
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4.3.1
        with:
          dotnet-version: "9.0.x"

      - name: Install SonarScanner for .NET
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Begin SonarScanner
        working-directory: C#/TodoAppAPI
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"KayPham05_TrelloAppClone_V2"
          /o:"kaypham05"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.projectBaseDir="$GITHUB_WORKSPACE"
          /d:sonar.cs.opencover.reportsPaths="../../coverage/dotnet/**/coverage.opencover.xml"
          /d:sonar.dart.lcov.reportPaths="../../coverage/lcov.info"
          /d:sonar.exclusions="**/node_modules/**,**/vendor/**,**/*.g.dart,**/*.freezed.dart,**/*.gen.dart,**/generated/**,**/build/**,**/ios/**,**/android/**,**/bin/**,**/obj/**,**/Migrations/**,**/wwwroot/**,Web/**"
          /d:sonar.coverage.exclusions="Flutter/trellon_flutter/test/**,Flutter/trellon_flutter/lib/**/presentation/pages/**/*.dart,Flutter/trellon_flutter/lib/**/presentation/widgets/**/*.dart,Flutter/trellon_flutter/lib/**/presentation/controllers/**/*.dart,Flutter/trellon_flutter/lib/core/common_widgets/**/*.dart,Flutter/trellon_flutter/lib/core/widgets/**/*.dart,Flutter/trellon_flutter/lib/core/errors/app_exception_mapper.dart,Flutter/trellon_flutter/lib/core/network/interceptors/auth_interceptor.dart,Flutter/trellon_flutter/lib/features/board/presentation/cubit/board_cubit.dart,Flutter/trellon_flutter/lib/features/inbox/presentation/bloc/inbox_cubit.dart,Flutter/trellon_flutter/lib/features/inbox/**/*.dart,Flutter/trellon_flutter/lib/init_dependencies.dart,Flutter/trellon_flutter/lib/core/data_sources/user_local_data_source.dart,Flutter/trellon_flutter/lib/features/activity/data/services/notification_realtime_service.dart"
          /d:sonar.c.file.suffixes=-
          /d:sonar.cpp.file.suffixes=-
          /d:sonar.objc.file.suffixes=-
          /d:sonar.sourceEncoding=UTF-8

      # ===== FLUTTER SETUP & TEST =====
      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f80ef994 # v2.21.0
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Get Flutter dependencies
        working-directory: Flutter/trellon_flutter
        run: flutter pub get --enforce-lockfile
        continue-on-error: false

      - name: Prepare Flutter env for CI
        working-directory: Flutter/trellon_flutter
        env:
          FLUTTER_API_URL: ${{ secrets.FLUTTER_API_URL }}
        run: |
          if [ -n "$FLUTTER_API_URL" ]; then
            printf 'API_URL=%s\n' "$FLUTTER_API_URL" > .env
          else
            printf 'API_URL=http://127.0.0.1:5293/v1/api/\n' > .env
          fi
        continue-on-error: false

      - name: Run Flutter tests with coverage
        working-directory: Flutter/trellon_flutter
        run: |
          if [ -d "test" ]; then
            flutter test --coverage
            # Di chuyển coverage report về root (2 cấp lên)
            mkdir -p ../../coverage
            cp coverage/lcov.info ../../coverage/
          else
            echo "No Flutter tests found, skipping..."
          fi
        continue-on-error: false

      # ===== .NET BUILD & TEST =====
      - name: Restore .NET dependencies
        working-directory: C#/TodoAppAPI
        run: dotnet restore TodoAppAPI.sln
        continue-on-error: false

      - name: Build .NET project
        working-directory: C#/TodoAppAPI
        run: dotnet build TodoAppAPI.sln --no-restore
        continue-on-error: false

      - name: Run .NET tests with coverage
        working-directory: C#/TodoAppAPI
        run: dotnet test TodoAppAPI.sln --no-build --collect:"XPlat Code Coverage" --results-directory ../../coverage/dotnet -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        continue-on-error: false

      - name: Verify coverage reports
        run: |
          test -f coverage/lcov.info
          find coverage/dotnet -name coverage.opencover.xml -print -quit | grep -q .

      # ===== SONARCLOUD SCAN END =====
      - name: End SonarScanner
        working-directory: C#/TodoAppAPI
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
