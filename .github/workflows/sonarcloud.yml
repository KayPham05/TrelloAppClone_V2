name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ===== SETUP SONARSCANNER FOR .NET =====
      - name: Setup Java 17 (Required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install SonarScanner for .NET
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Begin SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"KayPham05_TrelloAppClone_V2"
          /o:"kaypham05"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"

      # ===== FLUTTER SETUP & TEST =====
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Get Flutter dependencies
        working-directory: Flutter/trellon_flutter
        run: flutter pub get
        continue-on-error: false

      - name: Prepare Flutter env for CI
        working-directory: Flutter/trellon_flutter
        env:
          FLUTTER_API_URL: ${{ secrets.FLUTTER_API_URL }}
        run: |
          if [ -n "$FLUTTER_API_URL" ]; then
            printf 'API_URL=%s\n' "$FLUTTER_API_URL" > .env
          else
            printf 'API_URL=http://127.0.0.1:5293/v1/api/\n' > .env
          fi
        continue-on-error: false

      - name: Run Flutter tests with coverage
        working-directory: Flutter/trellon_flutter
        run: |
          if [ -d "test" ]; then
            flutter test --coverage
            # Di chuyển coverage report về root (2 cấp lên)
            mkdir -p ../../coverage
            cp coverage/lcov.info ../../coverage/
          else
            echo "No Flutter tests found, skipping..."
          fi
        continue-on-error: false

      # ===== .NET BUILD & TEST =====
      - name: Restore .NET dependencies
        working-directory: C#/TodoAppAPI
        run: dotnet restore TodoAppAPI.sln
        continue-on-error: false

      - name: Build .NET project
        working-directory: C#/TodoAppAPI
        run: dotnet build TodoAppAPI.sln --no-restore --no-incremental
        continue-on-error: false

      - name: Run .NET tests with coverage
        working-directory: C#/TodoAppAPI
        run: dotnet test TodoAppAPI.sln --no-build --collect:"XPlat Code Coverage" --results-directory ../../coverage/dotnet -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        continue-on-error: false

      - name: Verify coverage reports
        run: |
          test -f coverage/lcov.info
          find coverage/dotnet -name coverage.opencover.xml -print -quit | grep -q .

      # ===== SONARCLOUD SCAN END =====
      - name: End SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
