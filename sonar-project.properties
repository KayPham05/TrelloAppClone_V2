sonar.projectKey=KayPham05_TrelloAppClone_V2
sonar.organization=kaypham05

# Source directories
sonar.sources=.

# Exclusions
sonar.exclusions=**/node_modules/**,**/vendor/**,**/*.test.*,**/*.g.dart,**/*.freezed.dart,**/*.gen.dart,**/generated/**,**/build/**,**/ios/**,**/android/app/build/**,**/bin/**,**/obj/**

# Test sources (nếu có)
sonar.tests=test

# Coverage reports
# Flutter coverage (nếu có file lcov.info)
sonar.dart.lcov.reportPaths=coverage/lcov.info

# .NET coverage (nếu có file coverage.opencover.xml)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Fix lỗi C/C++/Objective-C
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Language specific settings
sonar.sourceEncoding=UTF-8