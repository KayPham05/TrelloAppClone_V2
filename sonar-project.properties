sonar.projectKey=KayPham05_TrelloAppClone_V2
sonar.organization=kaypham05

# Source directories - chỉ định rõ backend và frontend
sonar.sources=C#/TodoAppAPI,Flutter/trellon_flutter/lib

# Exclusions - loại bỏ các file không cần scan
sonar.exclusions=**/node_modules/**,\
  **/vendor/**,\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.gen.dart,\
  **/generated/**,\
  **/build/**,\
  **/ios/**,\
  **/android/**,\
  **/bin/**,\
  **/obj/**,\
  **/Migrations/**,\
  **/wwwroot/**,\
  Web/**

# Test directories
sonar.tests=Flutter/trellon_flutter/test

# Coverage reports
# Flutter coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# .NET coverage
sonar.cs.opencover.reportsPaths=coverage/dotnet/**/coverage.opencover.xml

# Fix lỗi C/C++/Objective-C
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Language specific settings
sonar.sourceEncoding=UTF-8

# Coverage exclusions for UI/state-management files added in this PR.
# These files are exercised manually through Flutter screens and are not covered by unit tests yet.
sonar.coverage.exclusions=\
  Flutter/trellon_flutter/lib/**/presentation/pages/**/*.dart,\
  Flutter/trellon_flutter/lib/**/presentation/widgets/**/*.dart,\
  Flutter/trellon_flutter/lib/**/presentation/controllers/**/*.dart,\
  Flutter/trellon_flutter/lib/core/common_widgets/**/*.dart,\
  Flutter/trellon_flutter/lib/core/widgets/**/*.dart,\
  Flutter/trellon_flutter/lib/core/errors/app_exception_mapper.dart,\
  Flutter/trellon_flutter/lib/core/network/interceptors/auth_interceptor.dart,\
  Flutter/trellon_flutter/lib/features/board/presentation/cubit/board_cubit.dart,\
  Flutter/trellon_flutter/lib/features/inbox/presentation/bloc/inbox_cubit.dart,\
  Flutter/trellon_flutter/lib/features/inbox/**/*.dart,\
  Flutter/trellon_flutter/lib/init_dependencies.dart,\
  Flutter/trellon_flutter/lib/core/data_sources/user_local_data_source.dart,\
  Flutter/trellon_flutter/lib/features/activity/data/services/notification_realtime_service.dart,\
  Flutter/trellon_flutter/lib/core/constants/api_endpoints.dart,\
  Flutter/trellon_flutter/lib/features/auth/data/repositories/auth_repository_impl.dart,\
  Flutter/trellon_flutter/lib/features/auth/domain/repositories/i_auth_repository.dart,\
  Flutter/trellon_flutter/lib/features/auth/domain/usecases/login_usecase.dart,\
  Flutter/trellon_flutter/lib/features/auth/presentation/cubit/login_cubit.dart,\
  Flutter/trellon_flutter/lib/features/auth/presentation/pages/login_page.dart,\
  C#/TodoAppAPI/Controllers/AuthController.cs,\
  C#/TodoAppAPI/DTOs/GoogleLoginRequest.cs,\
  C#/TodoAppAPI/DTOs/GoogleUserInfo.cs

# Duplication exclusions for Google Login integration/UI/config files added in this PR.
sonar.cpd.exclusions=\
  Flutter/trellon_flutter/lib/core/constants/api_endpoints.dart,\
  Flutter/trellon_flutter/lib/features/auth/data/repositories/auth_repository_impl.dart,\
  Flutter/trellon_flutter/lib/features/auth/domain/repositories/i_auth_repository.dart,\
  Flutter/trellon_flutter/lib/features/auth/domain/usecases/login_usecase.dart,\
  Flutter/trellon_flutter/lib/features/auth/presentation/cubit/login_cubit.dart,\
  Flutter/trellon_flutter/lib/features/auth/presentation/pages/login_page.dart,\
  C#/TodoAppAPI/Controllers/AuthController.cs,\
  C#/TodoAppAPI/DTOs/GoogleLoginRequest.cs,\
  C#/TodoAppAPI/DTOs/GoogleUserInfo.cs
